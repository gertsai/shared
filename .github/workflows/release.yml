name: Release

# Publishes @gertsai/* packages to GitHub Packages (the private registry
# scoped to this repo's owner). Use this for internal testing across
# multiple projects before any public npm publish.
#
# Switch to public npm by:
#   1. Changing publishConfig.registry in each package.json to
#      https://registry.npmjs.org  (or removing the field entirely).
#   2. Replacing the registry-url + NODE_AUTH_TOKEN below with the npm
#      registry + secrets.NPM_TOKEN.
# (Tracked in README → Publishing section.)

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Opt into Node.js 24 for JavaScript actions (actions/checkout, actions/
# setup-node, pnpm/action-setup) so they don't emit the Node 20 deprecation
# warning. GitHub forces Node 24 by default starting 2026-06-02 and removes
# Node 20 entirely on 2026-09-16 — this env makes us future-proof.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@gertsai'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: 'chore: release packages'
          title: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
